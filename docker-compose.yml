# NexS Ascend — local end-to-end stack (app + MySQL).
#
#   cp .env.docker.example .env.docker    # edit secrets / external DB URLs
#   docker compose up --build
#
# One env file (.env.docker) drives BOTH services. The bundled MySQL serves the
# Prisma-modeled schemas for a self-contained run; raw-SQL warehouse queries hit
# EXTERNAL data in production:
#   - bosch — still a static host/user/password, set directly in .env.docker.
#   - NexS_DB / NexS_DB_PICKING — routed through the Adaptive PAM CLI in
#     production instead of a static credential/IP (set NEXS_DB_ADAPTIVE_ENDPOINT
#     / NEXS_DB_PICKING_ADAPTIVE_ENDPOINT; see .env.docker.example and
#     src/utils/adaptiveExecPool.ts). Adaptive login is one-time/browser-based -
#     the adaptive_token volume below persists it across container restarts.

services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    env_file:
      - .env.docker            # provides MYSQL_ROOT_PASSWORD (+ harmless extras)
    ports:
      - "127.0.0.1:3306:3306"  # loopback only — not published to the network
    volumes:
      - db_data:/var/lib/mysql
      - ./docker/mysql-init.sql:/docker-entrypoint-initdb.d/00-init.sql:ro
    healthcheck:
      # $$ → a literal $ handed to the container shell, which reads its OWN env.
      # Stays correct whatever MYSQL_ROOT_PASSWORD is (no compose substitution).
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p\"$$MYSQL_ROOT_PASSWORD\" --silent"]
      interval: 5s
      timeout: 5s
      retries: 30

  app:
    build:
      context: .
      args:
        # NEXT_PUBLIC_* is inlined at build time; export it in your shell before
        # `docker compose build` if you use it.
        NEXT_PUBLIC_AGENT_URL: ${NEXT_PUBLIC_AGENT_URL:-}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env.docker
    ports:
      - "3069:3069"
    volumes:
      # Named volume: seeded from the image's /app/data AND keeps the image's
      # nextjs:nodejs ownership (a host bind mount would mask + break writes).
      - app_data:/app/data
      # Persists the one-time `adaptive login` browser session across
      # restarts/redeploys. Unused (empty) unless NEXS_DB_ADAPTIVE_ENDPOINT /
      # NEXS_DB_PICKING_ADAPTIVE_ENDPOINT are set - harmless in local dev.
      - adaptive_token:/home/nextjs/.adaptive
      # --- NDD-RCA runtime secrets (optional feature). Create these files and
      #     uncomment to enable the ndd-rca pipeline. Token caches must be RW. ---
      # - ./secrets/gcreds.json:/app/src/app/api/packing-dispatch/ndd-rca/NDD-RCA/gcreds.json:ro
      # - ./secrets/gsheet_token.json:/app/src/app/api/packing-dispatch/ndd-rca/NDD-RCA/gsheet_token.json
      # - ./secrets/pbi_token_cache.json:/app/src/app/api/packing-dispatch/ndd-rca/NDD-RCA/pbi_token_cache.json

volumes:
  db_data:
  app_data:
  adaptive_token:
